name: Build and Release APK

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"
                  cache: gradle

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Build release APK
              run: ./gradlew assembleRelease

            - name: Set up Android SDK
              uses: android-actions/setup-android@v3

            - name: Install build-tools for signing
              run: sdkmanager "build-tools;36.0.0"

            - name: Sign release APK
              env:
                  SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
                  KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
                  KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
                  KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
              run: |
                  set -euo pipefail

                  KEYSTORE_PATH="$RUNNER_TEMP/release-key.jks"
                  UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
                  ALIGNED_APK="app/build/outputs/apk/release/app-release-aligned.apk"
                  SIGNED_APK="app/build/outputs/apk/release/app-release.apk"

                  echo "$SIGNING_KEY_BASE64" | base64 --decode > "$KEYSTORE_PATH"

                  ZIPALIGN_BIN="$ANDROID_HOME/build-tools/36.0.0/zipalign"
                  "$ZIPALIGN_BIN" -v -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"

                  jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
                    -keystore "$KEYSTORE_PATH" \
                    -storepass "$KEYSTORE_PASSWORD" \
                    -keypass "$KEY_PASSWORD" \
                    "$ALIGNED_APK" "$KEY_ALIAS"

                  mv "$ALIGNED_APK" "$SIGNED_APK"

            - name: Upload APK artifact
              uses: actions/upload-artifact@v4
              with:
                  name: signed-release-apk
                  path: app/build/outputs/apk/release/app-release.apk
                  if-no-files-found: error

            - name: Publish GitHub Release
              if: startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v2
              with:
                  files: app/build/outputs/apk/release/app-release.apk
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
